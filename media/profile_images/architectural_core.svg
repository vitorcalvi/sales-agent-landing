<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640">
  <defs>
    <linearGradient id="coreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a56db;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="structureGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.9" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="320" cy="320" r="310" fill="#0f172a" opacity="0.9"/>
  <circle cx="320" cy="320" r="300" fill="#1e293b" opacity="0.8"/>

  <!-- Tetrahedron wireframe - front triangle -->
  <polygon points="320,140 500,480 140,480" fill="none" stroke="url(#coreGradient)" stroke-width="4" filter="url(#glow)"/>
  
  <!-- Tetrahedron - back edges -->
  <polygon points="320,140 500,480 320,140" fill="none" stroke="url(#coreGradient)" stroke-width="3" opacity="0.6"/>
  <polygon points="140,480 500,480 320,140" fill="none" stroke="url(#coreGradient)" stroke-width="3" opacity="0.6"/>
  
  <!-- Inner connection lines -->
  <line x1="320" y1="260" x2="320" y2="140" stroke="url(#structureGradient)" stroke-width="2" opacity="0.7"/>
  <line x1="320" y1="260" x2="500" y2="480" stroke="url(#structureGradient)" stroke-width="2" opacity="0.7"/>
  <line x1="320" y1="260" x2="140" y2="480" stroke="url(#structureGradient)" stroke-width="2" opacity="0.7"/>

  <!-- Core center node -->
  <circle cx="320" cy="320" r="25" fill="url(#coreGradient)" opacity="0.8"/>
  <circle cx="320" cy="320" r="15" fill="#e0e7ff"/>
  <circle cx="320" cy="320" r="8" fill="url(#coreGradient)"/>

  <!-- Corner nodes -->
  <circle cx="320" cy="140" r="10" fill="url(#structureGradient)"/>
  <circle cx="500" cy="480" r="10" fill="url(#structureGradient)"/>
  <circle cx="140" cy="480" r="10" fill="url(#structureGradient)"/>

  <!-- Architectural lines radiating outward -->
  <g stroke="#60a5fa" stroke-width="1.5" opacity="0.5">
    <line x1="320" y1="320" x2="320" y2="80"/>
    <line x1="320" y1="320" x2="560" y2="320"/>
    <line x1="320" y1="320" x2="80" y2="320"/>
    <line x1="320" y1="320" x2="560" y2="560"/>
    <line x1="320" y1="320" x2="80" y2="560"/>
  </g>

  <!-- Subtle grid lines in background -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <line x1="160" y1="160" x2="480" y2="160"/>
    <line x1="160" y1="480" x2="480" y2="480"/>
    <line x1="160" y1="160" x2="160" y2="480"/>
    <line x1="480" y1="160" x2="480" y2="480"/>
  </g>
</svg>