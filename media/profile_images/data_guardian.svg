<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dataFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#67e8f9;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0.8" />
    </linearGradient>
    <filter id="shieldGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="320" cy="320" r="310" fill="#0f172a" opacity="0.9"/>
  <circle cx="320" cy="320" r="300" fill="#1e293b" opacity="0.8"/>

  <!-- Shield shape -->
  <path d="M320,80 L420,160 L420,280 Q420,420 320,480 Q220,420 220,280 L220,160 Z" 
        fill="none" 
        stroke="url(#shieldGradient)" 
        stroke-width="6" 
        filter="url(#shieldGlow)"/>
  
  <!-- Inner shield structure -->
  <path d="M320,120 L380,180 L380,270 Q380,350 320,400 Q260,350 260,270 L260,180 Z" 
        fill="none" 
        stroke="url(#shieldGradient)" 
        stroke-width="2.5" 
        opacity="0.6"/>

  <!-- Lock icon in center -->
  <g transform="translate(320,250)">
    <!-- Lock body -->
    <rect x="-25" y="0" width="50" height="40" rx="6" fill="none" stroke="url(#shieldGradient)" stroke-width="3"/>
    <!-- Lock shackle -->
    <path d="M-15,-10 Q-15,-35 0,-35 Q15,-35 15,-10" 
          fill="none" 
          stroke="url(#shieldGradient)" 
          stroke-width="3" 
          stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="0" cy="25" r="4" fill="#22d3ee"/>
    <rect x="-2" y="25" width="4" height="10"/>
  </g>

  <!-- Data streams -->
  <g font-family="monospace" font-size="12" fill="#22d3ee" opacity="0.7">
    <!-- Stream 1 (left) -->
    <text x="100" y="180">01100101</text>
    <text x="80" y="200">11001010</text>
    <text x="90" y="220">00101101</text>
    
    <!-- Stream 2 (right) -->
    <text x="540" y="200">10110100</text>
    <text x="560" y="220">01001011</text>
    <text x="550" y="240">11010010</text>
    
    <!-- Stream 3 (top) -->
    <text x="320" y="60">ENCRYPTED</text>
    <text x="320" y="45">SECURE</text>
  </g>

  <!-- Flow lines connecting to shield -->
  <g stroke="#22d3ee" stroke-width="1.5" opacity="0.5">
    <path d="M140,220 Q220,220 260,240" fill="none"/>
    <path d="M500,220 Q420,220 380,240" fill="none"/>
    <path d="M320,80 Q320,120 320,160" fill="none"/>
  </g>

  <!-- Corner decorative elements -->
  <g stroke="#14b8a6" stroke-width="2" opacity="0.6">
    <path d="M80,100 L120,100" />
    <path d="M80,540 L120,540" />
    <path d="M560,100 L520,100" />
    <path d="M560,540 L520,540" />
    
    <!-- Small diagonal lines -->
    <path d="M100,80 L100,120" />
    <path d="M540,80 L540,120" />
    <path d="M100,560 L100,520" />
    <path d="M540,560 L540,520" />
  </g>

  <!-- Static overlay effect -->
  <g fill="#14b8a6" opacity="0.15">
    <rect x="150" y="350" width="2" height="6"/>
    <rect x="200" y="345" width="1" height="8"/>
    <rect x="440" y="380" width="3" height="5"/>
    <rect x="490" y="370" width="2" height="7"/>
  </g>
</svg>