<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
  <defs>
    <linearGradient id="mirrorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="640" height="640" fill="#1a1a2e"/>
  <!-- Stylized mirror frame -->
  <rect x="120" y="80" width="400" height="480" rx="20" fill="none" stroke="url(#mirrorGrad)" stroke-width="12" filter="url(#glow)"/>
  <!-- Inner mirror surface with gradient -->
  <rect x="140" y="100" width="360" height="440" rx="10" fill="url(#mirrorGrad)" opacity="0.3"/>
  <!-- Synthetic eye symbolizing reflection/self -->
  <circle cx="320" cy="280" r="80" fill="none" stroke="#e0e0ff" stroke-width="4"/>
  <circle cx="320" cy="280" r="40" fill="#e0e0ff" opacity="0.6"/>
  <circle cx="320" cy="280" r="15" fill="#ffffff"/>
  <!-- Reflection lines -->
  <line x1="160" y1="400" x2="480" y2="400" stroke="#667eea" stroke-width="2" opacity="0.5"/>
  <line x1="180" y1="430" x2="460" y2="430" stroke="#764ba2" stroke-width="2" opacity="0.4"/>
  <line x1="200" y1="460" x2="440" y2="460" stroke="#667eea" stroke-width="2" opacity="0.3"/>
  <!-- Label -->
  <text x="320" y="570" font-family="Arial, sans-serif" font-size="24" fill="#e0e0ff" text-anchor="middle" opacity="0.8">SYNTHETIC MIRROR</text>
</svg>